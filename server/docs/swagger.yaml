basePath: /api/v1
definitions:
  entity.DiscountType:
    enum:
    - amount
    - percentage
    type: string
    x-enum-varnames:
    - DiscountAmount
    - DiscountPercentage
  entity.PromoType:
    enum:
    - direct discount
    - voucher code
    type: string
    x-enum-varnames:
    - DirectDiscount
    - VoucherCode
  request.CreatePaymentMethodRequest:
    properties:
      icon_url:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    required:
    - name
    type: object
  request.CreateProductRequest:
    properties:
      category_id:
        type: integer
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      variant_types:
        items:
          $ref: '#/definitions/request.CreateVariantTypeRequest'
        minItems: 1
        type: array
    required:
    - category_id
    - name
    type: object
  request.CreateVariantTypeRequest:
    properties:
      name:
        type: string
      values:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    type: object
  request.PromotionRequest:
    properties:
      description:
        type: string
      discount_type:
        allOf:
        - $ref: '#/definitions/entity.DiscountType'
        enum:
        - amount
        - percentage
      discount_value:
        minimum: 0
        type: number
      end_date:
        type: string
      is_published:
        type: boolean
      is_shown:
        type: boolean
      maximum_discount:
        minimum: 0
        type: number
      minimum_order_value:
        minimum: 0
        type: number
      name:
        type: string
      product_ids:
        items:
          type: integer
        type: array
      start_date:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entity.PromoType'
        enum:
        - direct discount
        - voucher code
      usage_limit:
        minimum: 0
        type: integer
      voucher_code:
        type: string
    required:
    - discount_type
    - discount_value
    - end_date
    - name
    - start_date
    - type
    type: object
  request.PromotionUpdateRequest:
    properties:
      description:
        type: string
      discount_type:
        allOf:
        - $ref: '#/definitions/entity.DiscountType'
        enum:
        - amount
        - percentage
      discount_value:
        minimum: 0
        type: number
      end_date:
        type: string
      is_published:
        type: boolean
      is_shown:
        type: boolean
      maximum_discount:
        minimum: 0
        type: number
      minimum_order_value:
        minimum: 0
        type: number
      name:
        type: string
      product_ids:
        items:
          type: integer
        type: array
      start_date:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entity.PromoType'
        enum:
        - direct discount
        - voucher code
      usage_limit:
        minimum: 0
        type: integer
      voucher_code:
        type: string
    type: object
  request.UpdatePaymentMethodRequest:
    properties:
      icon_url:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
  request.UpdateProductRequest:
    properties:
      category_id:
        type: integer
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        type: string
      variants:
        items:
          $ref: '#/definitions/request.UpdateVariantTypeRequest'
        type: array
    type: object
  request.UpdatePublishRequest:
    properties:
      is_published:
        type: boolean
    type: object
  request.UpdateSKURequest:
    properties:
      id:
        type: integer
      images:
        items:
          type: string
        type: array
      min_stock:
        type: integer
      price:
        type: number
      sale_price:
        type: number
      sku_code:
        type: string
      status:
        enum:
        - active
        - inactive
        - archived
        type: string
      stock:
        type: integer
      weight:
        type: number
    type: object
  request.UpdateVariantTypeRequest:
    properties:
      id:
        type: integer
      name:
        type: string
      status:
        enum:
        - clean
        - created
        - updated
        - deleted
        type: string
      values:
        items:
          $ref: '#/definitions/request.UpdateVariantValueRequest'
        type: array
    type: object
  request.UpdateVariantValueRequest:
    properties:
      id:
        type: integer
      status:
        enum:
        - clean
        - created
        - updated
        - deleted
        type: string
      value:
        type: string
    type: object
  utils.Response:
    properties:
      data: {}
      errors: {}
      fields: {}
      message:
        type: string
      status:
        type: boolean
    type: object
